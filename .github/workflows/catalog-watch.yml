name: Mouse catalog watch

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: catalog
        run: node scripts/check-new-mice.mjs
      - name: Notify about new mice
        if: steps.catalog.outputs.new_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          handles=$(jq -r '.newHandles[] | "- `" + . + "`"' work/catalog-watch.json)
          body=$(printf 'EloShapes 数据库检测到以下本站尚未收录的新鼠标：\n\n%s\n\n更新前请核验型号、尺寸、重量、模具、国行参考价及来源，然后运行全库测试并发布。' "$handles")
          issue=$(gh issue list --state open --search '新鼠标待更新 in:title' --json number --jq '.[0].number // empty')
          if [ -n "$issue" ]; then
            gh issue comment "$issue" --body "$body"
          else
            gh issue create --title '新鼠标待更新' --body "$body"
          fi
